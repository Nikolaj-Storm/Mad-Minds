# Fly.io config for the Google Search Console MCP.
# Change `app` to your chosen name; it must match the OAuth redirect URI
# (https://<app>.fly.dev/auth/callback) and FASTMCP_SERVER_AUTH_GOOGLE_BASE_URL.
app = "onlineminds-gsc-mcp"
primary_region = "ams"  # Amsterdam (close to DK). Change if you prefer.

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false    # keep 1 machine always-on so OAuth tokens/registrations (in memory) survive
  auto_start_machines = true
  min_machines_running = 1

# Persistent disk for OAuth client/token storage (CLIENT_STORAGE_DIR=/data).
# Survives restarts and redeploys so marketers sign in once, ever.
[mounts]
  source = "gsc_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
