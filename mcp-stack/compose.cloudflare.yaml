# Mad Minds MCP stack — Cloudflare Tunnel, TWO Meta business areas.
#
# Use this instead of the Tailscale compose when the public URL must be a real
# domain (Facebook OAuth rejects Tailscale's shared .ts.net). One cloudflared
# dials out to Cloudflare and serves both instances via two Public Hostnames you
# configure on the tunnel (no inbound ports, no root):
#
#   https://meta-onlineminds.<domain>/mcp -> meta-ads-onlineminds:8000
#   https://meta-rentumo.<domain>/mcp     -> meta-ads-rentumo:8000
#
# Deploy (see README / chat):
#   cp cloudflared.env.example cloudflared.env   # paste TUNNEL_TOKEN
#   # set each META_OAUTH_BASE_URL to its https://meta-*.<domain>
#   docker compose -f compose.cloudflare.yaml up -d --build
name: madminds-mcp

x-meta-ads: &meta-ads
  build: ../meta-ads-mcp
  image: madminds/meta-ads-mcp:latest
  restart: unless-stopped
  networks: [mcpnet]
  expose: ["8000"]

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run        # reads TUNNEL_TOKEN from the env
    env_file: ./cloudflared.env
    networks: [mcpnet]
    depends_on: [meta-ads-onlineminds, meta-ads-rentumo]

  meta-ads-onlineminds:
    <<: *meta-ads
    env_file: ./meta-onlineminds.env
    volumes:
      - meta_onlineminds_data:/data

  meta-ads-rentumo:
    <<: *meta-ads
    env_file: ./meta-rentumo.env
    volumes:
      - meta_rentumo_data:/data

networks:
  mcpnet:

volumes:
  meta_onlineminds_data:
  meta_rentumo_data:
