# Mad Minds MCP stack — Tailscale Funnel edition (no domain, no root, free).
#
# A tailscale container joins your tailnet in USERSPACE mode (works under rootless
# Docker — no tun device, no NET_ADMIN) and uses Funnel to serve a stable public
# HTTPS URL like https://meta-mcp.<your-tailnet>.ts.net, forwarding to the MCP
# over the internal mcpnet network. No inbound ports, no domain, no sudo.
#
# One Tailscale node can Funnel several MCPs (different paths) — or run one
# tailscale service per MCP for clean per-subdomain URLs. See README.md.
#
# Deploy (on the server, as mcp — see README.md for the one-time Tailscale setup):
#   cp tailscale.env.example tailscale.env   # paste TS_AUTHKEY
#   cp meta.env.example meta.env             # secrets + META_OAUTH_BASE_URL
#   docker compose up -d --build
name: madminds-mcp

services:
  tailscale:
    image: tailscale/tailscale:latest
    restart: unless-stopped
    env_file: ./tailscale.env            # TS_AUTHKEY=tskey-auth-...
    environment:
      TS_HOSTNAME: meta-mcp              # -> https://meta-mcp.<tailnet>.ts.net
      TS_USERSPACE: "true"              # rootless-friendly (no /dev/net/tun, no NET_ADMIN)
      TS_STATE_DIR: /var/lib/tailscale   # persist node identity across restarts
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ./tailscale/serve.json:/config/serve.json:ro
      - ts_state:/var/lib/tailscale
    networks: [mcpnet]
    depends_on: [meta-ads-mcp]

  meta-ads-mcp:
    build: ../meta-ads-mcp
    image: madminds/meta-ads-mcp:latest
    restart: unless-stopped
    env_file: ./meta.env
    volumes:
      - meta_data:/data            # persists the OAuth token store (sign in once)
    networks: [mcpnet]
    expose:
      - "8000"                     # reached only by the tailscale Funnel over mcpnet

networks:
  mcpnet:

volumes:
  ts_state:
  meta_data:
