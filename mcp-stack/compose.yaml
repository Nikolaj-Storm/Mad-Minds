# Mad Minds MCP stack — Cloudflare Tunnel edition (no root, no inbound ports).
#
# cloudflared dials OUT to Cloudflare, which serves public HTTPS and forwards to
# each MCP over the internal mcpnet network. Perfect for the rootless / no-sudo
# Hetzner box: nothing binds privileged ports, nothing is exposed on the host.
#
# One tunnel serves every MCP. Adding an MCP = add a service here + add a Public
# Hostname in the Cloudflare tunnel dashboard (e.g. gads-mcp.<domain> ->
# http://gads-mcp:8000). No new tunnel, token, or DNS record needed.
#
# Deploy (on the server, as mcp — see README.md):
#   cp meta.env.example meta.env              # fill in secrets + domain
#   cp cloudflared.env.example cloudflared.env # paste the tunnel token
#   docker compose up -d --build
name: madminds-mcp

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run        # reads TUNNEL_TOKEN from the env
    env_file: ./cloudflared.env
    networks: [mcpnet]
    depends_on: [meta-ads-mcp]

  meta-ads-mcp:
    build: ../meta-ads-mcp
    image: madminds/meta-ads-mcp:latest
    restart: unless-stopped
    env_file: ./meta.env
    volumes:
      - meta_data:/data            # persists the OAuth token store (sign in once)
    networks: [mcpnet]
    expose:
      - "8000"                     # reached only by cloudflared over mcpnet

  # --- Add the next MCP like this (uncomment + adjust), then add its Public
  # --- Hostname in the Cloudflare tunnel dashboard pointing at http://gads-mcp:8000
  # gads-mcp:
  #   build: ../gads-mcp
  #   image: madminds/gads-mcp:latest
  #   restart: unless-stopped
  #   env_file: ./gads.env
  #   volumes:
  #     - gads_data:/data
  #   networks: [mcpnet]
  #   expose: ["8000"]

networks:
  mcpnet:

volumes:
  meta_data:
  # gads_data:
