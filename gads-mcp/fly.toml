app = "onlineminds-gads-mcp"
primary_region = "ams"

[build]

[env]
  # Safety: writes SIMULATE until you flip this to "false". Reads work regardless.
  # Real writes are additionally gated by the /ad-actions spend-gate in Mad Minds.
  READONLY_MODE = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "gads_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
